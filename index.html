<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetica | Ultimate Creator Super-App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { 'premium-bg': '#E8E8E8', 'premium-dark': '#111111', 'premium-muted': '#737373', 'premium-card': '#FFFFFF' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #E8E8E8; color: #111111; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hover-lift { transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .hover-lift:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .img-zoom img { transition: transform 1s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .img-zoom:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="antialiased pb-10">

    <nav class="bg-[#E8E8E8]/95 backdrop-blur-md px-6 py-4 sticky top-0 z-50 border-b border-gray-300">
        <div class="max-w-[1400px] mx-auto flex items-center justify-between gap-6">
            <div class="flex-shrink-0 flex items-center space-x-4">
                <span class="text-2xl font-serif font-semibold tracking-[0.15em] uppercase text-premium-dark">Aesthetica.</span>
                <div class="hidden md:flex items-center space-x-1 text-[10px] uppercase tracking-widest font-medium border-l border-gray-400 pl-4">
                    <span class="opacity-60">📍</span>
                    <span class="border-b border-premium-dark pb-0.5 transition-all hover:text-premium-muted cursor-pointer">Patna</span>
                </div>
            </div>

            <div class="flex-grow max-w-xl hidden md:flex items-center bg-white rounded-full border border-gray-200 overflow-hidden shadow-sm transition-all duration-300 focus-within:ring-1 focus-within:ring-premium-dark focus-within:border-premium-dark">
                <input type="text" placeholder="Search aesthetics or drop a photo..." class="w-full bg-transparent py-2.5 px-6 text-xs focus:outline-none placeholder-gray-400">
                <button class="text-[9px] uppercase tracking-widest font-medium text-premium-dark bg-gray-50 border-l border-gray-100 px-5 py-2.5 hover:bg-gray-200 transition-colors duration-300">
                    📸 Photo Search
                </button>
            </div>

            <div class="flex items-center gap-6">
                <button id="auth-btn" onclick="toggleAuthModal()" class="text-[11px] uppercase tracking-[0.15em] font-medium text-white bg-premium-dark px-4 py-2 hover:bg-gray-800 transition-colors">Login</button>
                <button class="text-[11px] uppercase tracking-[0.15em] font-medium text-premium-dark border-b border-premium-dark pb-0.5 hover:opacity-60 transition-opacity">Cart (0)</button>
            </div>
        </div>
    </nav>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex justify-center items-center">
        <div class="bg-white p-8 rounded-[2px] w-full max-w-md relative animate-fade-in-up">
            <button onclick="toggleAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black">✕</button>
            
            <h2 id="auth-title" class="text-2xl font-serif text-premium-dark mb-6">Welcome Back.</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest font-medium text-gray-500 block mb-1">Email</label>
                    <input type="email" id="email-input" class="w-full border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:border-premium-dark" placeholder="you@example.com">
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest font-medium text-gray-500 block mb-1">Password</label>
                    <input type="password" id="password-input" class="w-full border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:border-premium-dark" placeholder="••••••••">
                </div>
                
                <p id="auth-error" class="text-red-500 text-[10px] uppercase tracking-widest hidden"></p>

                <button id="submit-auth-btn" onclick="handleAuth()" class="w-full bg-premium-dark text-white text-[11px] uppercase tracking-widest font-medium py-3 hover:bg-gray-800 transition">
                    Login
                </button>
            </div>

            <div class="mt-6 text-center text-[10px] uppercase tracking-widest font-medium text-gray-500">
                <span id="auth-switch-text">New here?</span> 
                <button onclick="toggleAuthMode()" id="auth-switch-btn" class="text-premium-dark border-b border-premium-dark ml-1">Create Account</button>
            </div>
        </div>
    </div>

    <main class="max-w-[1400px] mx-auto px-6 py-8">
        
        <div class="flex space-x-8 overflow-x-auto hide-scroll text-[10px] uppercase tracking-[0.2em] font-medium text-premium-muted border-b border-gray-300 pb-4 mb-10">
            <a href="#" class="text-premium-dark border-b border-premium-dark pb-1 whitespace-nowrap">All Collections</a>
            <a href="#" class="hover:text-premium-dark transition whitespace-nowrap">Local Shops</a>
            <a href="#" class="hover:text-premium-dark transition whitespace-nowrap">Rentals</a>
        </div>

        <div class="space-y-20"> 
            <section>
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-serif text-premium-dark">Cheapest Finds Online</h2>
                </div>
                <div id="cheapest-products" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <p class="text-sm text-gray-400 italic">Loading live drops...</p>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-serif text-premium-dark flex items-center">Local Boutiques</h2>
                </div>
                <div id="local-products" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <p class="text-sm text-gray-400 italic">Loading local stores...</p>
                </div>
            </section>
            
            <section>
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-serif text-premium-dark">Rentals & Props (P2P)</h2>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="bg-premium-card p-4 rounded-[2px] hover-lift relative img-zoom group flex flex-col shadow-sm border border-transparent hover:border-gray-200 transition-all">
                        <div class="absolute top-3 right-3 z-10 bg-premium-dark text-white text-[7px] uppercase tracking-widest px-1.5 py-0.5 shadow-sm rounded-sm animate-pulse">Kit Incl.</div>
                        <div class="absolute top-3 left-3 z-10 bg-white border border-gray-200 text-premium-dark text-[8px] uppercase tracking-[0.15em] px-1.5 py-0.5 shadow-sm">P2P Rental</div>
                        <div class="aspect-[4/5] bg-gray-50 overflow-hidden mb-3 rounded-[2px]"><img src="https://images.unsplash.com/photo-1558981403-c5f9899a28bc?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover"></div>
                        <h3 class="text-sm font-medium text-premium-dark line-clamp-1 group-hover:text-gray-600 transition-colors">Continental GT 650</h3>
                        <p class="text-[9px] text-premium-muted uppercase tracking-widest mt-1 mb-1">Lender: Rahul K. ★ 4.9</p>
                        
                        <div class="mt-auto border-t border-gray-100 pt-3 flex justify-between items-center">
                            <div><span class="text-base font-serif font-medium">₹1,200</span><span class="text-[9px] text-gray-400">/4h</span></div>
                            <button class="text-[9px] uppercase tracking-widest font-medium bg-premium-dark text-white px-3 py-1.5 hover:bg-gray-800 transition-colors duration-300">Rent</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://iiophmxrnhsjygxfzvyx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpb3BobXhybmhzanlneGZ6dnl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDk5OTcsImV4cCI6MjA5NTYyNTk5N30.eHMjLv0Z5VhxXJCDMc09Uta-vaRlFzz9hdHFIQZ-xrg';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- AUTHENTICATION LOGIC ---
        let isLoginMode = true;
        let currentUser = null;

        // UI toggles
        function toggleAuthModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.toggle('hidden');
            document.getElementById('auth-error').classList.add('hidden');
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Welcome Back.' : 'Join Aesthetica.';
            document.getElementById('submit-auth-btn').innerText = isLoginMode ? 'Login' : 'Sign Up';
            document.getElementById('auth-switch-text').innerText = isLoginMode ? 'New here?' : 'Already a creator?';
            document.getElementById('auth-switch-btn').innerText = isLoginMode ? 'Create Account' : 'Login';
        }

        // Check if user is already logged in on page load
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            updateAuthUI(session?.user);
        }

        // Update Navbar based on login status
        function updateAuthUI(user) {
            currentUser = user;
            const authBtn = document.getElementById('auth-btn');
            if (user) {
                authBtn.innerText = "Logout";
                authBtn.onclick = handleLogout;
                authBtn.classList.replace('bg-premium-dark', 'bg-red-900');
            } else {
                authBtn.innerText = "Login";
                authBtn.onclick = toggleAuthModal;
                authBtn.classList.replace('bg-red-900', 'bg-premium-dark');
            }
        }

        // Handle Signup / Login
        async function handleAuth() {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('auth-error');
            
            if(!email || !password) {
                errorMsg.innerText = "Please enter email and password.";
                errorMsg.classList.remove('hidden');
                return;
            }

            document.getElementById('submit-auth-btn').innerText = "Processing...";

            try {
                if (isLoginMode) {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    toggleAuthModal();
                    updateAuthUI(data.user);
                } else {
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    toggleAuthModal();
                    updateAuthUI(data.user);
                    alert("Account Created! Welcome to Aesthetica.");
                }
            } catch (error) {
                errorMsg.innerText = error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                document.getElementById('submit-auth-btn').innerText = isLoginMode ? 'Login' : 'Sign Up';
            }
        }

        // Handle Logout
        async function handleLogout() {
            await supabaseClient.auth.signOut();
            updateAuthUI(null);
            alert("Logged out successfully.");
        }

        // --- PRODUCT LOADING LOGIC ---
        async function loadLiveProducts() {
            try {
                const { data, error } = await supabaseClient.from('products').select('*');
                if (error) throw error;
                
                const cheapestContainer = document.getElementById('cheapest-products');
                const localContainer = document.getElementById('local-products');
                
                cheapestContainer.innerHTML = '';
                localContainer.innerHTML = '';

                const defaultImg = "https://images.unsplash.com/photo-1596755094514-f87e34085b2c?auto=format&fit=crop&q=80&w=400";

                data.forEach(product => {
                    const imageUrl = product.image_url ? product.image_url : defaultImg;
                    const cardHTML = `
                        <div class="bg-premium-card p-4 rounded-[2px] hover-lift relative img-zoom group flex flex-col shadow-sm border border-transparent hover:border-gray-100 transition-all">
                            <div class="absolute top-3 left-3 z-10 ${product.is_local ? 'bg-gray-200 text-premium-dark' : 'bg-premium-dark text-white'} text-[8px] uppercase tracking-[0.15em] px-1.5 py-0.5 shadow-sm">
                                ${product.is_local ? 'Local Store' : 'Cheapest Drop'}
                            </div>
                            <div class="aspect-[4/5] bg-gray-50 overflow-hidden mb-3 rounded-[2px]">
                                <img src="${imageUrl}" class="w-full h-full object-cover">
                            </div>
                            <h3 class="text-sm font-medium text-premium-dark line-clamp-1 group-hover:text-gray-600 transition-colors">${product.title}</h3>
                            <div class="mt-auto border-t border-gray-100 pt-3 flex justify-between items-center">
                                <span class="text-base font-serif font-medium">₹${product.price}</span>
                                <button class="text-[9px] uppercase tracking-widest font-medium border border-premium-dark px-3 py-1.5 hover:bg-premium-dark hover:text-white transition-colors duration-300">
                                    Buy
                                </button>
                            </div>
                        </div>
                    `;

                    if(product.is_local) {
                        localContainer.innerHTML += cardHTML;
                    } else {
                        cheapestContainer.innerHTML += cardHTML;
                    }
                });
            } catch (error) {
                console.error("Data Load Error:", error.message);
            }
        }

        // Initialize App
        checkSession();
        loadLiveProducts();
    </script>
</body>
</html>
